<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>珍藏大師平台</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 隱藏捲軸但保留滾動功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 彈窗動畫 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }
    .animate-zoom-in {
      animation: zoomIn 0.2s ease-out forwards;
    }
    /* 隱藏元素 */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body class="flex h-screen bg-slate-50 text-slate-800 font-sans">

  <!-- 側邊欄導航 -->
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm z-10">
    <div class="p-6 border-b border-slate-100 flex items-center gap-3">
      <div class="bg-indigo-600 text-white p-2 rounded-lg">
        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
      </div>
      <h1 class="text-xl font-bold text-slate-800 tracking-tight">珍藏大師</h1>
    </div>

    <div class="p-4 flex-1 overflow-y-auto no-scrollbar">
      <div class="mb-2 text-xs font-semibold text-slate-400 uppercase tracking-wider pl-3">分類導航</div>
      <nav id="category-nav" class="space-y-1">
        <!-- 分類按鈕將由 JS 動態生成 -->
      </nav>
    </div>

    <div class="p-4 border-t border-slate-100">
      <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
        <i data-lucide="settings" class="w-[18px] h-[18px] text-slate-400"></i>
        個人設定與同步
      </button>
    </div>
  </aside>

  <!-- 主內容區 -->
  <main class="flex-1 flex flex-col overflow-hidden">
    
    <!-- 頂部控制列 -->
    <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between shadow-sm z-0">
      
      <!-- 搜尋框 -->
      <div class="relative w-96">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-[18px] h-[18px]"></i>
        <input 
          type="text" 
          id="search-input"
          placeholder="搜尋收藏品名稱..."
          class="w-full pl-10 pr-4 py-2 bg-slate-100 border-transparent rounded-lg focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
        >
      </div>

      <div class="flex items-center gap-4">
        <!-- 視圖切換 -->
        <div class="flex bg-slate-100 p-1 rounded-lg">
          <button 
            id="view-grid-btn"
            class="p-1.5 rounded-md transition-colors bg-white shadow-sm text-indigo-600"
            title="網格視圖"
          >
            <i data-lucide="grid" class="w-[18px] h-[18px]"></i>
          </button>
          <button 
            id="view-list-btn"
            class="p-1.5 rounded-md transition-colors text-slate-500 hover:text-slate-700"
            title="列表視圖"
          >
            <i data-lucide="list" class="w-[18px] h-[18px]"></i>
          </button>
        </div>

        <!-- 新增按鈕 -->
        <button 
          id="open-add-modal-btn"
          class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm"
        >
          <i data-lucide="plus" class="w-[18px] h-[18px]"></i>
          <span>新增收藏</span>
        </button>
      </div>
    </header>

    <!-- 內容區塊 (滾動) -->
    <div class="flex-1 overflow-y-auto p-8 no-scrollbar">
      
      <!-- 儀表板統計 -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
          <div class="bg-blue-50 p-4 rounded-xl text-blue-600">
            <i data-lucide="box" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">當前分類總數</p>
            <p class="text-2xl font-bold text-slate-800"><span id="total-count">0</span> <span class="text-sm font-normal text-slate-500">件</span></p>
          </div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
          <div class="bg-emerald-50 p-4 rounded-xl text-emerald-600">
            <i data-lucide="trending-up" class="w-6 h-6"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-500">估計總價值 (TWD)</p>
            <p class="text-2xl font-bold text-slate-800">
              $<span id="total-value">0</span>
            </p>
          </div>
        </div>
      </div>

      <div class="mb-6 flex justify-between items-end">
        <h2 class="text-xl font-bold text-slate-800">
          <span id="current-category-title">全部</span> 收藏列表 
          <span id="search-feedback" class="text-slate-500 text-sm font-normal ml-2 hidden"></span>
        </h2>
      </div>

      <!-- 收藏品列表容器 -->
      <div id="items-container">
        <!-- 內容將由 JS 動態生成 -->
      </div>
    </div>
  </main>

  <!-- 新增收藏彈窗 -->
  <div id="add-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm hidden animate-fade-in">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-zoom-in">
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
        <h2 class="text-xl font-bold text-slate-800">新增收藏品</h2>
        <button 
          id="close-add-modal-btn"
          class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-md hover:bg-slate-100"
        >
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <form id="add-item-form" class="p-6">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">收藏品名稱 <span class="text-red-500">*</span></label>
            <input 
              type="text" 
              id="new-item-name"
              required
              class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow"
              placeholder="例如: 1980年限量版公仔"
            >
          </div>
          
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">類別</label>
            <select 
              id="new-item-category"
              class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white transition-shadow"
            >
              <!-- 選項由 JS 生成 -->
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">估計價值 (TWD) <span class="text-red-500">*</span></label>
            <input 
              type="number" 
              id="new-item-value"
              required
              min="0"
              class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-shadow"
              placeholder="例如: 15000"
            >
          </div>
        </div>

        <div class="mt-8 flex gap-3 justify-end">
          <button 
            type="button"
            id="cancel-add-btn"
            class="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors"
          >
            取消
          </button>
          <button 
            type="submit"
            class="px-4 py-2 text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg font-medium transition-colors shadow-sm"
          >
            確認新增
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- 商品詳細資訊彈窗 -->
  <div id="detail-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm hidden animate-fade-in">
    <div id="detail-modal-content" class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-zoom-in flex flex-col max-h-[90vh]">
      <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 flex-shrink-0">
        <h2 class="text-xl font-bold text-slate-800">商品詳細資訊</h2>
        <button 
          id="close-detail-modal-btn"
          class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-md hover:bg-slate-100"
        >
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <div class="p-8 flex flex-col items-center text-center overflow-y-auto no-scrollbar flex-1">
        <div id="detail-icon" class="w-24 h-24 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center mb-5 shadow-inner">
          <!-- 圖示由 JS 注入 -->
        </div>
        
        <h3 id="detail-name" class="text-2xl font-bold text-slate-800 mb-2"></h3>
        
        <span id="detail-category" class="inline-block px-3 py-1 bg-indigo-50 text-indigo-600 text-sm rounded-full font-medium mb-8"></span>

        <div class="w-full space-y-3">
          <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
            <span class="text-slate-500 font-medium">估計價值</span>
            <span id="detail-value" class="font-bold text-indigo-600 text-xl"></span>
          </div>
          
          <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
            <span class="text-slate-500 font-medium">入藏日期</span>
            <span id="detail-date" class="font-medium text-slate-700"></span>
          </div>
          
          <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100">
            <span class="text-slate-500 font-medium">系統編號</span>
            <span id="detail-id" class="font-medium text-slate-400 font-mono text-sm"></span>
          </div>
        </div>
        
        <!-- AI 聯網查詢區塊 -->
        <div class="mt-6 w-full text-left">
          <button
            id="fetch-ai-btn"
            class="w-full flex items-center justify-center gap-2 p-3 bg-blue-50 text-blue-600 rounded-xl border border-blue-100 hover:bg-blue-100 transition-colors font-medium shadow-sm"
          >
            <i data-lucide="search" class="w-[18px] h-[18px]"></i>
            取得網路介紹與市場概況 (AI 統整)
          </button>

          <div id="ai-loading" class="w-full p-6 bg-slate-50 rounded-xl border border-slate-200 flex flex-col items-center justify-center gap-3 hidden">
             <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-blue-500"></i>
             <span class="text-sm text-slate-500">正在搜尋與統整網路資訊...</span>
          </div>

          <div id="ai-error" class="w-full p-4 bg-red-50 text-red-600 rounded-xl border border-red-100 text-sm text-center hidden">
          </div>

          <div id="ai-result" class="w-full p-5 bg-blue-50/50 rounded-xl border border-blue-100 hidden">
             <h4 class="flex items-center gap-2 font-bold text-slate-800 mb-3">
               <i data-lucide="bot" class="w-[18px] h-[18px] text-blue-600"></i>
               AI 聯網摘要
             </h4>
             <div id="ai-summary-text" class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">
             </div>
             <div id="ai-sources-container" class="mt-4 pt-3 border-t border-blue-100/50 hidden">
               <h5 class="text-xs font-semibold text-slate-500 mb-2">參考來源：</h5>
               <ul id="ai-sources-list" class="space-y-1.5 max-h-24 overflow-y-auto no-scrollbar">
                 <!-- 來源列表由 JS 注入 -->
               </ul>
             </div>
          </div>
        </div>
      </div>
      
      <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end flex-shrink-0">
         <button 
            id="close-detail-footer-btn"
            class="px-5 py-2.5 text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 rounded-lg font-medium transition-colors shadow-sm"
          >
            關閉
          </button>
      </div>
    </div>
  </div>

  <script>
    // --- 應用程式狀態 ---
    const AppState = {
      items: [
        { id: 1, name: '徠卡 M6 經典底片相機', category: '相機', value: 85000, date: '2023-10-12', icon: 'camera' },
        { id: 2, name: '勞力士 Submariner 綠水鬼', category: '手錶', value: 450000, date: '2023-11-05', icon: 'watch' },
        { id: 3, name: '清朝光緒元寶 銀幣', category: '硬幣', value: 32000, date: '2024-01-20', icon: 'coins' },
        { id: 4, name: '梵谷星夜 (複製品)', category: '藝術品', value: 5000, date: '2024-02-14', icon: 'palette' },
        { id: 5, name: '哈蘇 500C/M', category: '相機', value: 65000, date: '2024-03-01', icon: 'camera' },
      ],
      categories: [
        { name: '全部', icon: 'folder' },
        { name: '相機', icon: 'camera' },
        { name: '手錶', icon: 'watch' },
        { name: '硬幣', icon: 'coins' },
        { name: '藝術品', icon: 'palette' },
      ],
      searchQuery: '',
      selectedCategory: '全部',
      viewMode: 'grid', // 'grid' | 'list'
      selectedItem: null,
      filteredItems: []
    };

    // --- DOM 元素參考 ---
    const els = {
      categoryNav: document.getElementById('category-nav'),
      searchInput: document.getElementById('search-input'),
      viewGridBtn: document.getElementById('view-grid-btn'),
      viewListBtn: document.getElementById('view-list-btn'),
      itemsContainer: document.getElementById('items-container'),
      totalCount: document.getElementById('total-count'),
      totalValue: document.getElementById('total-value'),
      currentCategoryTitle: document.getElementById('current-category-title'),
      searchFeedback: document.getElementById('search-feedback'),
      
      // 新增彈窗
      addModal: document.getElementById('add-modal'),
      openAddModalBtn: document.getElementById('open-add-modal-btn'),
      closeAddModalBtn: document.getElementById('close-add-modal-btn'),
      cancelAddBtn: document.getElementById('cancel-add-btn'),
      addItemForm: document.getElementById('add-item-form'),
      newItemCategory: document.getElementById('new-item-category'),
      
      // 詳細資訊彈窗
      detailModal: document.getElementById('detail-modal'),
      detailModalContent: document.getElementById('detail-modal-content'),
      closeDetailModalBtn: document.getElementById('close-detail-modal-btn'),
      closeDetailFooterBtn: document.getElementById('close-detail-footer-btn'),
      
      // 詳細資訊內容
      detailIcon: document.getElementById('detail-icon'),
      detailName: document.getElementById('detail-name'),
      detailCategory: document.getElementById('detail-category'),
      detailValue: document.getElementById('detail-value'),
      detailDate: document.getElementById('detail-date'),
      detailId: document.getElementById('detail-id'),
      
      // AI 區塊
      fetchAiBtn: document.getElementById('fetch-ai-btn'),
      aiLoading: document.getElementById('ai-loading'),
      aiError: document.getElementById('ai-error'),
      aiResult: document.getElementById('ai-result'),
      aiSummaryText: document.getElementById('ai-summary-text'),
      aiSourcesContainer: document.getElementById('ai-sources-container'),
      aiSourcesList: document.getElementById('ai-sources-list')
    };

    // --- 輔助函式 ---
    const getCategoryIconColorClass = (iconName) => {
      switch(iconName) {
        case 'camera': return 'text-blue-500';
        case 'watch': return 'text-emerald-500';
        case 'coins': return 'text-yellow-500';
        case 'palette': return 'text-purple-500';
        default: return 'text-gray-500';
      }
    };

    const getIconElementStr = (iconName, sizeClass = 'w-8 h-8', extraClasses = '') => {
      const colorClass = getCategoryIconColorClass(iconName);
      return `<i data-lucide="${iconName}" class="${sizeClass} ${colorClass} ${extraClasses}"></i>`;
    };

    const formatCurrency = (value) => {
      return Number(value).toLocaleString('en-US');
    };

    // --- 核心邏輯與渲染 ---
    const updateFilteredItems = () => {
      AppState.filteredItems = AppState.items.filter(item => {
        const matchCategory = AppState.selectedCategory === '全部' || item.category === AppState.selectedCategory;
        const matchSearch = item.name.toLowerCase().includes(AppState.searchQuery.toLowerCase());
        return matchCategory && matchSearch;
      });
      render();
    };

    const renderCategories = () => {
      els.categoryNav.innerHTML = AppState.categories.map(cat => {
        const isSelected = AppState.selectedCategory === cat.name;
        const count = cat.name === '全部' ? AppState.items.length : AppState.items.filter(i => i.category === cat.name).length;
        
        return `
          <button
            onclick="handleCategoryClick('${cat.name}')"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors duration-200 ${
              isSelected ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
            }"
          >
            <i data-lucide="${cat.icon}" class="w-[18px] h-[18px] ${isSelected ? 'text-indigo-600' : 'text-slate-400'}"></i>
            ${cat.name}
            <span class="ml-auto text-xs py-0.5 px-2 bg-slate-100 rounded-full text-slate-500">
              ${count}
            </span>
          </button>
        `;
      }).join('');
      lucide.createIcons();
    };

    const renderItems = () => {
      if (AppState.filteredItems.length === 0) {
        els.itemsContainer.innerHTML = `
          <div class="bg-white rounded-2xl border border-slate-200 border-dashed p-12 text-center flex flex-col items-center">
            <i data-lucide="folder" class="w-12 h-12 text-slate-300 mb-4"></i>
            <h3 class="text-lg font-medium text-slate-800 mb-1">沒有找到收藏品</h3>
            <p class="text-slate-500">嘗試調整分類、清除搜尋，或是新增一個收藏項目。</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      if (AppState.viewMode === 'grid') {
        els.itemsContainer.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            ${AppState.filteredItems.map(item => `
              <div 
                onclick="openDetailModal(${item.id})"
                class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm hover:shadow-md transition-shadow group cursor-pointer"
              >
                <div class="h-48 bg-slate-50 flex items-center justify-center border-b border-slate-100 group-hover:bg-slate-100 transition-colors">
                  ${getIconElementStr(item.icon)}
                </div>
                <div class="p-5">
                  <div class="flex justify-between items-start mb-2">
                    <h3 class="font-semibold text-slate-800 text-lg leading-tight truncate pr-2">${item.name}</h3>
                  </div>
                  <div class="flex items-center justify-between mt-4">
                    <span class="inline-block px-2.5 py-1 bg-slate-100 text-slate-600 text-xs rounded-full font-medium">
                      ${item.category}
                    </span>
                    <span class="font-bold text-indigo-600">
                      $${formatCurrency(item.value)}
                    </span>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        els.itemsContainer.innerHTML = `
          <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-slate-50 border-b border-slate-100 text-slate-500 text-sm uppercase tracking-wider">
                  <th class="p-4 font-medium">圖示</th>
                  <th class="p-4 font-medium">名稱</th>
                  <th class="p-4 font-medium">分類</th>
                  <th class="p-4 font-medium">入藏日期</th>
                  <th class="p-4 font-medium text-right">估值 (TWD)</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                ${AppState.filteredItems.map(item => `
                  <tr 
                    onclick="openDetailModal(${item.id})"
                    class="hover:bg-slate-50 transition-colors cursor-pointer"
                  >
                    <td class="p-4">
                      <div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center">
                         ${getIconElementStr(item.icon, 'w-5 h-5')}
                      </div>
                    </td>
                    <td class="p-4 font-medium text-slate-800">${item.name}</td>
                    <td class="p-4">
                      <span class="inline-block px-2.5 py-1 bg-slate-100 text-slate-600 text-xs rounded-full">
                        ${item.category}
                      </span>
                    </td>
                    <td class="p-4 text-slate-500 text-sm">${item.date}</td>
                    <td class="p-4 text-right font-bold text-indigo-600">$${formatCurrency(item.value)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
      lucide.createIcons();
    };

    const renderHeader = () => {
      // 統計數據
      els.totalCount.textContent = AppState.filteredItems.length;
      const totalVal = AppState.filteredItems.reduce((sum, item) => sum + Number(item.value), 0);
      els.totalValue.textContent = formatCurrency(totalVal);

      // 標題與搜尋提示
      els.currentCategoryTitle.textContent = AppState.selectedCategory;
      if (AppState.searchQuery) {
        els.searchFeedback.textContent = `(搜尋: "${AppState.searchQuery}")`;
        els.searchFeedback.classList.remove('hidden');
      } else {
        els.searchFeedback.classList.add('hidden');
      }

      // 視圖按鈕狀態
      if (AppState.viewMode === 'grid') {
        els.viewGridBtn.className = "p-1.5 rounded-md transition-colors bg-white shadow-sm text-indigo-600";
        els.viewListBtn.className = "p-1.5 rounded-md transition-colors text-slate-500 hover:text-slate-700";
      } else {
        els.viewGridBtn.className = "p-1.5 rounded-md transition-colors text-slate-500 hover:text-slate-700";
        els.viewListBtn.className = "p-1.5 rounded-md transition-colors bg-white shadow-sm text-indigo-600";
      }
    };

    const initAddFormOptions = () => {
      const options = AppState.categories
        .filter(c => c.name !== '全部')
        .map(cat => `<option value="${cat.name}">${cat.name}</option>`)
        .join('');
      els.newItemCategory.innerHTML = options;
    };

    const render = () => {
      renderCategories();
      renderItems();
      renderHeader();
    };

    // --- 事件處理函式 ---
    window.handleCategoryClick = (categoryName) => {
      AppState.selectedCategory = categoryName;
      updateFilteredItems();
    };

    els.searchInput.addEventListener('input', (e) => {
      AppState.searchQuery = e.target.value;
      updateFilteredItems();
    });

    els.viewGridBtn.addEventListener('click', () => {
      AppState.viewMode = 'grid';
      render();
    });

    els.viewListBtn.addEventListener('click', () => {
      AppState.viewMode = 'list';
      render();
    });

    // 新增彈窗邏輯
    const toggleAddModal = (show) => {
      if (show) {
        els.addModal.classList.remove('hidden');
        document.getElementById('new-item-name').focus();
      } else {
        els.addModal.classList.add('hidden');
        els.addItemForm.reset();
      }
    };

    els.openAddModalBtn.addEventListener('click', () => toggleAddModal(true));
    els.closeAddModalBtn.addEventListener('click', () => toggleAddModal(false));
    els.cancelAddBtn.addEventListener('click', () => toggleAddModal(false));
    els.addModal.addEventListener('click', (e) => {
      if (e.target === els.addModal) toggleAddModal(false);
    });

    els.addItemForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('new-item-name').value;
      const category = document.getElementById('new-item-category').value;
      const value = document.getElementById('new-item-value').value;

      if (!name || !value) return;

      const iconName = AppState.categories.find(c => c.name === category)?.icon || 'folder';

      const newItem = {
        id: Date.now(),
        name,
        category,
        value: Number(value),
        date: new Date().toISOString().split('T')[0],
        icon: iconName
      };

      AppState.items.unshift(newItem);
      toggleAddModal(false);
      updateFilteredItems();
    });

    // 詳細資訊彈窗邏輯
    const resetAiState = () => {
      els.fetchAiBtn.classList.remove('hidden');
      els.aiLoading.classList.add('hidden');
      els.aiError.classList.add('hidden');
      els.aiResult.classList.add('hidden');
      els.aiSummaryText.innerHTML = '';
      els.aiSourcesList.innerHTML = '';
      els.aiSourcesContainer.classList.add('hidden');
    };

    window.openDetailModal = (itemId) => {
      const item = AppState.items.find(i => i.id === itemId);
      if (!item) return;
      
      AppState.selectedItem = item;
      
      els.detailIcon.innerHTML = getIconElementStr(item.icon, 'w-12 h-12');
      els.detailName.textContent = item.name;
      els.detailCategory.textContent = item.category;
      els.detailValue.textContent = `$${formatCurrency(item.value)}`;
      els.detailDate.textContent = item.date;
      els.detailId.textContent = `#${item.id}`;
      
      resetAiState();
      lucide.createIcons();
      els.detailModal.classList.remove('hidden');
    };

    const closeDetailModal = () => {
      AppState.selectedItem = null;
      els.detailModal.classList.add('hidden');
      resetAiState();
    };

    els.closeDetailModalBtn.addEventListener('click', closeDetailModal);
    els.closeDetailFooterBtn.addEventListener('click', closeDetailModal);
    els.detailModal.addEventListener('click', (e) => {
      if (e.target === els.detailModal) closeDetailModal();
    });

    // AI 聯網查詢邏輯
    els.fetchAiBtn.addEventListener('click', async () => {
      if (!AppState.selectedItem) return;
      
      const itemName = AppState.selectedItem.name;
      
      els.fetchAiBtn.classList.add('hidden');
      els.aiLoading.classList.remove('hidden');
      els.aiError.classList.add('hidden');

      const apiKey = ""; // 系統會在執行環境自動帶入金鑰
      const promptText = `請用純文字簡短介紹收藏品「${itemName}」的背景知識、歷史意義或目前的市場概況，請控制在 150 字左右，且不要使用 Markdown 語法（如星號）。`;
      const payload = {
        contents: [{ parts: [{ text: promptText }] }],
        tools: [{ google_search: {} }]
      };

      const maxRetries = 5;
      const delays = [1000, 2000, 4000, 8000, 16000];
      let attempt = 0;

      while (attempt < maxRetries) {
        try {
          // 如果沒有 API Key，模擬一個回應或直接報錯，這裡保留原結構
          if(!apiKey) {
            throw new Error("Missing API Key");
          }

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

          const result = await response.json();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          const attributions = result.candidates?.[0]?.groundingMetadata?.groundingAttributions;

          let uris = [];
          if (attributions) {
             uris = attributions
              .filter(a => a.web?.uri && a.web?.title)
              .map(a => ({ uri: a.web.uri, title: a.web.title }));
             
             const uniqueUris = [];
             const seen = new Set();
             uris.forEach(u => {
               if (!seen.has(u.uri)) {
                 seen.add(u.uri);
                 uniqueUris.push(u);
               }
             });
             uris = uniqueUris;
          }

          els.aiLoading.classList.add('hidden');
          els.aiResult.classList.remove('hidden');
          els.aiSummaryText.textContent = text || '找不到相關資訊。';
          
          if (uris.length > 0) {
            els.aiSourcesList.innerHTML = uris.map(s => `
              <li class="truncate">
                <a href="${s.uri}" target="_blank" rel="noopener noreferrer" class="text-xs text-blue-500 hover:underline flex items-center gap-1.5 truncate">
                  <i data-lucide="external-link" class="w-3 h-3 flex-shrink-0"></i>
                  <span class="truncate">${s.title}</span>
                </a>
              </li>
            `).join('');
            els.aiSourcesContainer.classList.remove('hidden');
            lucide.createIcons();
          }

          return; // 成功即離開迴圈
        } catch (error) {
          attempt++;
          if (attempt >= maxRetries || !apiKey) {
            els.aiLoading.classList.add('hidden');
            els.aiError.classList.remove('hidden');
            // 如果是在無金鑰環境測試，提供一個友善的提示
            els.aiError.textContent = !apiKey ? '系統金鑰未設定，無法進行 AI 聯網查詢。' : '無法載入資訊，請稍後再試。';
            els.fetchAiBtn.classList.remove('hidden'); // 允許重試
            break;
          } else {
            await new Promise(res => setTimeout(res, delays[attempt - 1]));
          }
        }
      }
    });

    // --- 初始化 ---
    initAddFormOptions();
    updateFilteredItems(); // 這會觸發 render() 和 lucide.createIcons()

  </script>
</body>
</html>
